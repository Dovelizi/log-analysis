# GitHub Actions CI：push/pr 时跑 mvn test 和 docker build（未推送到 registry）
#
# 如果项目迁到工蜂/gitlab，这个文件可以作为参考 .gitlab-ci.yml / .workflow.yml 的模板。
#
# **未在 GitHub 真实跑过**，需要用户初次 push 后根据报错微调。
name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    name: 单元测试
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_DATABASE: cls_logs
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -ptestpass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven

      - name: 单元测试
        run: mvn -B -q test
        # 单元测试不连真实 DB（全 MockBean），但保留 services 以便后续扩展

      - name: 打包（skipTests）
        run: mvn -B -q -DskipTests package

      - name: 上传 jar 产物
        uses: actions/upload-artifact@v4
        with:
          name: loganalysis-jar
          path: target/loganalysis.jar
          retention-days: 7

  docker-build:
    name: Docker 镜像构建
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (不推送)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: loganalysis-java:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 简单验证 image 能启动
        run: |
          docker run -d --name smoke \
            -p 18080:8080 \
            -e ENCRYPTION_FORBID_AUTO_GEN=false \
            loganalysis-java:ci-${{ github.sha }}
          # 等 health 返回（会连不上 MySQL，但 Spring Boot 本身应起来）
          for i in $(seq 1 30); do
            sleep 2
            # /api/health 会因数据库不可用返回 503，但至少 HTTP 层在工作
            code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:18080/api/health || echo "000")
            if [ "$code" = "200" ] || [ "$code" = "503" ]; then
              echo "Spring Boot 已响应（$code）"
              exit 0
            fi
          done
          echo "容器未响应"
          docker logs smoke | tail -40
          exit 1
